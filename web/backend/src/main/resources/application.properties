# ===================================
# RasRas Plastics ERP Configuration
# ===================================

spring.application.name=rasrasplastics

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/rasrasplastics?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.database.mysql-path=C:\\laragon\\bin\\mysql\\mysql-8.4.3-winx64\\bin\\mysql.exe
app.database.mysqldump-path=C:\\laragon\\bin\\mysql\\mysql-8.4.3-winx64\\bin\\mysqldump.exe
# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Flyway — عند وجود schema موجود مسبقاً بدون جدول flyway_schema_history: baseline ثم تشغيل migrations
spring.flyway.baseline-on-migrate=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.show-actuator=false

# JWT Configuration
app.jwt.secret=RasRasPlasticsERPSecretKeyForJWTTokenGeneration2026VeryLongSecretKey
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Permission dependency startup check
app.permission-dependency.api-prefixes=ACCOUNTING_,INVENTORY_,FINANCE_,PROCUREMENT_,SALES_,SUPPLIER_INVOICE_

# Modulith
spring.modulith.detection-strategy=explicitly-annotated

# DevTools - إعادة تشغيل تلقائية عند تغيير الكود
spring.devtools.restart.enabled=true


# =========================
# LOGGING CONFIGURATION
# =========================

# Log file
logging.file.name=logs/application.log

# Global level → warnings & errors only
logging.level.root=WARN

# Your application logs
logging.level.com.rasras.erp=DEBUG

# Spring logs
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN

# Hibernate → show only errors
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR

# Disable SQL debug spam completely
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF